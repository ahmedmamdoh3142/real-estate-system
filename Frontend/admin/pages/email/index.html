<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="نظام البريد الإلكتروني الاحترافي - إدارة العقارات">
    <title data-i18n="appName">البريد الإلكتروني | نظام إدارة العقارات</title>
    
    <!-- نظام التصميم العالمي -->
    <link rel="stylesheet" href="/global/css/design-system.css">
    <link rel="stylesheet" href="/global/css/utilities.css">
    <link rel="stylesheet" href="/global/css/animations.css">
    
    <!-- CSS الخاص بالصفحة (محسن بالكامل للجوال وبدون فراغات سفلية) -->
    <link rel="stylesheet" href="email.css">
    
    <!-- Font Awesome للايقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
</head>
<body class="dark-mode rtl email-page">
    <!-- 🔔 منطقة الإشعارات العائمة -->
    <div id="notification-area" class="notification-container"></div>


    <!-- 🎯 المحتوى الرئيسي للبريد -->
    <main class="email-main">
        <!-- شريط علوي للجوال محسن بالكامل -->
        <div class="mobile-top-bar">
            <div class="mobile-actions">
                <button class="menu-toggle" id="menu-toggle" aria-label="القائمة الرئيسية">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <h2 class="mobile-title" data-i18n="email">البريد الإلكتروني</h2>
            <button class="mobile-compose-btn" id="mobile-compose-btn" aria-label="بريد جديد">
                <i class="fas fa-pen"></i>
            </button>
        </div>

        <div class="email-container">
            <!-- القائمة الجانبية للبريد (المجلدات) - تظهر في الجوال عند الطلب كـ off-canvas -->
            <aside class="email-sidebar" id="email-sidebar">
                <div class="email-sidebar-header">
                    <button class="btn btn-primary compose-btn" id="compose-btn">
                        <i class="fas fa-pen"></i>
                        <span data-i18n="compose">جديد</span>
                    </button>
                </div>

                <div class="folders-list">
                    <div class="folder-item active" data-folder="inbox">
                        <i class="fas fa-inbox"></i>
                        <span class="folder-name" data-i18n="inbox">صندوق الوارد</span>
                        <span class="folder-badge" id="inbox-badge">0</span>
                    </div>
                    <div class="folder-item" data-folder="sent">
                        <i class="fas fa-paper-plane"></i>
                        <span class="folder-name" data-i18n="sent">المرسلة</span>
                        <span class="folder-badge" id="sent-badge">0</span>
                    </div>
                </div>

                <div class="folders-divider"></div>
            </aside>

            <!-- طبقة خلفية لقائمة المجلدات في الجوال -->
            <div class="email-sidebar-backdrop" id="email-sidebar-backdrop"></div>

            <!-- منطقة قائمة الرسائل -->
            <div class="emails-list-area" id="emails-list-area">
                <div class="emails-list-header">
                    <div class="emails-search">
                        <i class="fas fa-search"></i>
                        <input type="text" class="emails-search-input" id="emails-search-input" placeholder="بحث في البريد..." data-i18n-placeholder="searchEmails">
                    </div>
                    <div class="emails-actions">
                        <button class="btn-icon" id="signature-settings-btn" title="إعدادات التوقيع">
                            <i class="fas fa-signature"></i>
                        </button>
                        <button class="btn-icon" id="refresh-btn" title="تحديث">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>

                <div class="emails-list-container">
                    <div class="emails-list" id="emails-list">
                        <!-- سيتم تعبئتها عبر JavaScript -->
                    </div>
                </div>
            </div>

            <!-- منطقة عرض البريد المحدد -->
            <div class="email-view-area" id="email-view-area">
                <!-- شاشة الترحيب (عند عدم اختيار بريد) -->
                <div class="welcome-email-screen" id="welcome-email-screen">
                    <div class="welcome-icon">
                        <i class="fas fa-envelope-open-text"></i>
                    </div>
                    <h2 class="welcome-title" data-i18n="welcomeEmailTitle">البريد الإلكتروني</h2>
                    <p class="welcome-description" data-i18n="welcomeEmailDescription">اختر رسالة لقراءتها</p>
                    <button class="btn btn-primary" id="start-compose-btn">
                        <i class="fas fa-pen"></i>
                        <span data-i18n="composeNew">كتابة بريد جديد</span>
                    </button>
                </div>

                <!-- رأس البريد المحدد (يظهر عند اختيار بريد) -->
                <div class="email-view-header" id="email-view-header" style="display: none;">
                    <button class="btn-icon mobile-back-btn" id="mobile-back-btn">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    <div class="email-actions">
                        <button class="btn-icon" id="reply-btn" title="رد">
                            <i class="fas fa-reply"></i>
                        </button>
                        <button class="btn-icon" id="reply-all-btn" title="رد للكل">
                            <i class="fas fa-reply-all"></i>
                        </button>
                        <button class="btn-icon" id="forward-btn" title="إعادة توجيه">
                            <i class="fas fa-share"></i>
                        </button>
                    </div>
                </div>

                <!-- محتوى البريد المحدد -->
                <div class="email-content" id="email-content" style="display: none;">
                    <div class="email-subject" id="email-subject"></div>
                    <div class="email-meta">
                        <div class="email-from">
                            <div class="avatar-placeholder" id="email-from-avatar">س</div>
                            <div class="from-details">
                                <span class="from-name" id="email-from-name"></span>
                                <span class="from-email" id="email-from-email"></span>
                            </div>
                        </div>
                        <div class="email-date" id="email-date"></div>
                    </div>
                    <div class="email-to" id="email-to"></div>
                    <div class="email-body" id="email-body">
                        <!-- سيتم عرض نص البريد -->
                    </div>
                    <div class="email-attachments" id="email-attachments" style="display: none;">
                        <h4 data-i18n="attachments">المرفقات</h4>
                        <div class="attachments-list" id="attachments-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 🎪 Modal لكتابة بريد جديد -->
    <div class="modal" id="compose-modal">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title" data-i18n="composeNewMessage">رسالة جديدة</h3>
                    <button class="modal-close" id="compose-modal-close">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="compose-form">
                        <div class="form-group">
                            <label for="compose-to" data-i18n="to">إلى</label>
                            <input type="email" class="form-control" id="compose-to" placeholder="example@domain.com" required autocomplete="off">
                            <div class="autocomplete-suggestions" id="to-suggestions"></div>
                        </div>
                        <div class="form-group">
                            <label for="compose-cc" data-i18n="cc">Cc</label>
                            <input type="text" class="form-control" id="compose-cc" placeholder="cc@domain.com" autocomplete="off">
                            <div class="autocomplete-suggestions" id="cc-suggestions"></div>
                        </div>
                        <div class="form-group">
                            <label for="compose-bcc" data-i18n="bcc">Bcc</label>
                            <input type="text" class="form-control" id="compose-bcc" placeholder="bcc@domain.com" autocomplete="off">
                            <div class="autocomplete-suggestions" id="bcc-suggestions"></div>
                        </div>
                        <div class="form-group">
                            <label for="compose-subject" data-i18n="subject">الموضوع</label>
                            <input type="text" class="form-control" id="compose-subject" required>
                        </div>
                        <div class="form-group">
                            <label for="compose-body" data-i18n="messageBody">نص الرسالة</label>
                            <textarea class="form-control" id="compose-body" rows="8" required></textarea>
                        </div>
                        <!-- منطقة معاينة التوقيع -->
                        <div class="signature-preview-area" id="compose-signature-preview" style="margin-top: 1rem; border-top: 1px dashed var(--color-border); padding-top: 0.75rem;">
                            <label style="color: var(--color-text-secondary); font-size: 0.9rem; display: block; margin-bottom: 0.5rem;" data-i18n="signature">التوقيع:</label>
                            <div class="signature-preview" id="compose-signature-preview-content"></div>
                        </div>
                        <div class="form-group">
                            <label data-i18n="attachments">المرفقات</label>
                            <div class="attach-area" id="attach-area">
                                <input type="file" id="file-input" multiple style="display: none;">
                                <button type="button" class="btn btn-outline attach-btn" id="attach-file-btn">
                                    <i class="fas fa-paperclip"></i> إرفاق ملفات
                                </button>
                                <div class="attachments-preview" id="attachments-preview"></div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" id="send-email-btn" data-i18n="send">إرسال</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 🎪 Modal لإعدادات التوقيع -->
    <div class="modal" id="signature-modal">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title" data-i18n="signatureSettings">إعدادات التوقيع</h3>
                    <button class="modal-close" id="signature-modal-close">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label data-i18n="signatureHtml">رمز HTML للتوقيع</label>
                        <textarea class="form-control" id="signature-html" rows="10" placeholder="الصق كود HTML الخاص بتوقيعك هنا..."></textarea>
                    </div>
                    <div class="form-group">
                        <label data-i18n="signaturePreview">معاينة التوقيع</label>
                        <div class="signature-preview" id="signature-preview"></div>
                    </div>
                    <div class="form-group" style="display: flex; align-items: center;">
                        <input type="checkbox" id="signature-enabled" checked>
                        <label for="signature-enabled" style="margin:0 10px 0 0;" data-i18n="autoAddSignature">إضافة التوقيع تلقائياً في نهاية الرسائل الجديدة</label>
                    </div>
                    <p class="text-muted" style="color: var(--color-text-secondary); font-size:0.85rem;" data-i18n="signatureHelp">يمكنك لصق أي كود HTML وسيتم إدراجه كما هو.</p>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" id="signature-reset-default" data-i18n="resetDefault">استعادة التوقيع الافتراضي</button>
                    <button class="btn btn-primary" id="signature-save" data-i18n="save">حفظ التوقيع</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 🎪 Modal لعرض الصورة المرفقة -->
    <div class="modal" id="image-viewer-modal">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title" data-i18n="imageView">عرض الصورة</h3>
                    <button class="modal-close" id="image-viewer-close">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body" style="text-align: center;" id="image-viewer-body">
                    <img src="" alt="صورة" style="max-width: 100%; max-height: 70vh;" id="image-viewer-img">
                </div>
                <div class="modal-footer">
                    <a href="#" download id="image-viewer-download" class="btn btn-primary" data-i18n="download">تحميل</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 📜 ملفات JavaScript -->
    <script src="/global/js/core.js"></script>
    <script src="email.js"></script>
</body>
</html>
